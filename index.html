<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Damas Brasileira</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', sans-serif;
  background: #1a1008;
  color: #f5f0e8;
  min-height: 100vh;

  display: flex;
  flex-direction: column;
  align-items: center;

  justify-content: flex-start; /* 🔥 CORRIGIDO */

  padding: 16px;
}

h1 { font-size: 2rem; font-weight: 800; color: #f5c842; text-shadow: 0 0 16px rgba(245,200,66,0.4); margin-bottom: 4px; }
.subtitle { color: #a0917a; font-size: 0.85rem; margin-bottom: 20px; }

#menu { text-align: center; max-width: 380px; width: 100%; }

.crown-icon { font-size: 3rem; margin-bottom: 8px; display: block; }

.mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }

.mode-btn {
  background: #2a1e10;
  border: 2px solid #4a3520;
  color: #f5f0e8;
  padding: 16px 12px;
  border-radius: 12px;
  cursor: pointer;
}

.mode-btn.active { border-color: #c8922a; background: #3a2510; }

.start-btn {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, #c8922a, #a06a10);
  border: none;
  color: #fff;
  font-size: 1.1rem;
  font-weight: 800;
  border-radius: 12px;
}

.start-btn:disabled { opacity: 0.4; }

#game {
  display: none;
  flex-direction: column;
  align-items: center;

  width: 100%;
  max-width: 520px;

  height: 100vh; /* 🔥 CORRIGIDO */
  justify-content: flex-start;
}

.game-header { width: 100%; display: flex; justify-content: space-between; margin-bottom: 12px; }

.back-btn, .restart-btn {
  background: transparent;
  border: 1px solid #4a3520;
  color: #a0917a;
  padding: 6px 12px;
  border-radius: 8px;
}

.player-info {
  width: 100%;
  display: flex;
  gap: 12px;
  padding: 10px 14px;
  border-radius: 12px;
  background: #2a1e10;
  border: 2px solid #4a3520;
  margin: 6px 0;
}

.board-wrap {
  position: relative;
  border-radius: 12px;
  overflow: hidden;
  border: 4px solid #5a3a1a;
  margin: 10px 0; /* 🔥 ADICIONADO */
}

#board {
  display: grid;
  grid-template-columns: repeat(8, 1fr);

  width: min(90vw, 500px);  /* 🔥 CORRIGIDO */
  height: min(90vw, 500px); /* 🔥 CORRIGIDO */
}

.sq { display:flex; align-items:center; justify-content:center; cursor:pointer; }

.sq.light { background:#c8a878; }
.sq.dark { background:#7a4a22; }

.piece { width:80%; height:80%; border-radius:50%; }
.piece.black-p { background:#111; }
.piece.white-p { background:#fff; }

</style>
</head>

<body>

<div id="menu">
  <span class="crown-icon">♛</span>
  <h1>Damas</h1>
  <p class="subtitle">Jogo de Damas Brasileira</p>

  <div class="mode-grid">
    <button class="mode-btn" id="mode-pvp" onclick="selectMode('pvp')">
      👥 Jogador vs Jogador
    </button>

    <button class="mode-btn" id="mode-bot" onclick="selectMode('bot')">
      🤖 Jogador vs Bot
    </button>
  </div>

  <button class="start-btn" id="start-btn" onclick="startGame()" disabled>
    Selecionar modo
  </button>
</div>

<div id="game">
  <div class="game-header">
    <button class="back-btn" onclick="goHome()">← Menu</button>
    <button class="restart-btn" onclick="restartGame()">↺</button>
  </div>

  <div class="board-wrap">
    <div id="board"></div>
  </div>
</div>

<script type="module">
const EMPTY=null, BLACK='b', WHITE='w';

function createBoard(){
  const b=Array(8).fill(null).map(()=>Array(8).fill(EMPTY));
  for(let r=0;r<3;r++)for(let c=0;c<8;c++)if((r+c)%2) b[r][c]=WHITE;
  for(let r=5;r<8;r++)for(let c=0;c<8;c++)if((r+c)%2) b[r][c]=BLACK;
  return b;
}

let board=createBoard();

function render(){
  const el=document.getElementById('board');
  el.innerHTML='';
  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){
      const sq=document.createElement('div');
      sq.className='sq '+(((r+c)%2)?'dark':'light');

      if(board[r][c]){
        const p=document.createElement('div');
        p.className='piece '+(board[r][c]==BLACK?'black-p':'white-p');
        sq.appendChild(p);
      }

      el.appendChild(sq);
    }
  }
}

window.selectMode=function(m){
  document.getElementById('start-btn').disabled=false;
  document.getElementById('start-btn').textContent='Iniciar Jogo';
}

window.startGame=function(){
  document.getElementById('menu').style.display='none';
  document.getElementById('game').style.display='flex';
  render();
}

window.goHome=function(){
  document.getElementById('menu').style.display='block';
  document.getElementById('game').style.display='none';
}

window.restartGame=function(){
  board=createBoard();
  render();
}

render();
</script>

</body>
</html>
