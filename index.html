<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Damas Online</title>

<style>
body { font-family: Arial; background:#1a1008; color:white; text-align:center; }
button { padding:12px; margin:5px; border:none; border-radius:10px; cursor:pointer; }
#board { display:grid; grid-template-columns:repeat(8,1fr); width:320px; margin:20px auto; }
.sq { width:40px; height:40px; display:flex; align-items:center; justify-content:center; font-size:20px; }
.dark { background:#7a4a22; }
.light { background:#c8a878; }
</style>

</head>

<body>

<h1>♛ Damas Online</h1>

<button onclick="criarSala()">🔥 Criar Sala</button> <button onclick="entrarSala()">🌐 Entrar Sala</button>

<div id="board"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

// 🔥 SUA CONFIG (JÁ PRONTA)
const firebaseConfig = {
  apiKey: "AIzaSyAEhCjjnW2dzOd1gRLc0KHkf3lOEYqje0c",
  authDomain: "dama-77.firebaseapp.com",
  databaseURL: "https://dama-77-default-rtdb.firebaseio.com",
  projectId: "dama-77",
  storageBucket: "dama-77.firebasestorage.app",
  messagingSenderId: "267002047594",
  appId: "1:267002047594:web:911ef1cb65d84a44a26e13"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ===== VARIÁVEIS =====
let board = [];
let currentPlayer = "black";
let salaAtual = null;
let selecionado = null;

// ===== CRIAR TABULEIRO =====
function criarTabuleiro() {
  board = Array(8).fill().map(()=>Array(8).fill(null));

  for (let r=0;r<3;r++)
    for (let c=0;c<8;c++)
      if((r+c)%2) board[r][c]="w";

  for (let r=5;r<8;r++)
    for (let c=0;c<8;c++)
      if((r+c)%2) board[r][c]="b";

  render();
}

// ===== RENDER =====
function render() {
  const el = document.getElementById("board");
  el.innerHTML = "";

  for (let r=0;r<8;r++) {
    for (let c=0;c<8;c++) {
      const d = document.createElement("div");
      d.className = "sq " + ((r+c)%2?"dark":"light");
      d.onclick = ()=>jogar(r,c);

      if(board[r][c]=="b") d.textContent="⚫";
      else if(board[r][c]=="w") d.textContent="⚪";

      el.appendChild(d);
    }
  }
}

// ===== JOGAR =====
function jogar(r,c){
  if(!selecionado){
    selecionado=[r,c];
    return;
  }

  board[r][c] = board[selecionado[0]][selecionado[1]];
  board[selecionado[0]][selecionado[1]] = null;
  selecionado=null;

  currentPlayer = currentPlayer==="black"?"white":"black";

  salvarOnline();
  render();
}

// ===== MULTIPLAYER =====
window.criarSala = function(){
  salaAtual = Math.random().toString(36).substring(2,6);
  criarTabuleiro();

  set(ref(db,"salas/"+salaAtual),{
    board,
    currentPlayer
  });

  alert("Código da sala: "+salaAtual);
  ouvir();
}

window.entrarSala = function(){
  salaAtual = prompt("Código da sala:");
  ouvir();
}

function ouvir(){
  onValue(ref(db,"salas/"+salaAtual),(snap)=>{
    const d = snap.val();
    if(!d) return;

    board = d.board;
    currentPlayer = d.currentPlayer;

    render();
  });
}

function salvarOnline(){
  if(!salaAtual) return;

  update(ref(db,"salas/"+salaAtual),{
    board,
    currentPlayer
  });
}

// iniciar vazio
criarTabuleiro();

</script>

</body>
</html>
