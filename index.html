<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Damas Online</title>

<style>
body {
  margin:0;
  font-family:Segoe UI;
  background:#1a1008;
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
}

#menu,#game { width:100%; max-width:520px; }

button {
  padding:12px;
  border-radius:10px;
  border:none;
  cursor:pointer;
}

#board {
  display:grid;
  grid-template-columns:repeat(8,1fr);
  width:min(90vw,500px);
  height:min(90vw,500px);
}

.sq { display:flex; align-items:center; justify-content:center; }
.dark{background:#7a4a22;}
.light{background:#c8a878;}

.piece{width:80%;height:80%;border-radius:50%;}
.black{background:#111;}
.white{background:#fff;}

.player-bar{
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#2a1e10;
  margin:5px 0;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu">
  <h2>♛ Damas Online</h2>

  <input id="name" placeholder="Seu nome" style="width:100%;padding:10px;margin:5px 0">
  <input id="room" placeholder="Nome da sala" style="width:100%;padding:10px;margin:5px 0">

  <button onclick="joinRoom()">Entrar na Sala</button>
  <button onclick="playBot()">Jogar vs Bot</button>
</div>

<!-- GAME -->
<div id="game" style="display:none">

  <div class="player-bar">
    <span id="p1">Você</span>
    <span id="p2">Oponente</span>
  </div>

  <div id="board"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "SUA_KEY",
  authDomain: "SEU_APP.firebaseapp.com",
  databaseURL: "https://SEU_APP-default-rtdb.firebaseio.com",
  projectId: "SEU_APP",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ===== GAME =====
const EMPTY=null, B='b', W='w';

function startBoard(){
  const b=Array(8).fill().map(()=>Array(8).fill(EMPTY));
  for(let r=0;r<3;r++)for(let c=0;c<8;c++)if((r+c)%2)b[r][c]=W;
  for(let r=5;r<8;r++)for(let c=0;c<8;c++)if((r+c)%2)b[r][c]=B;
  return b;
}

let board=startBoard();
let room=null;
let name="";
let player="black";
let turn="black";

// ===== UI =====
window.joinRoom=function(){
  name=document.getElementById("name").value;
  room=document.getElementById("room").value;

  if(!name||!room) return alert("Preencha tudo");

  document.getElementById("menu").style.display="none";
  document.getElementById("game").style.display="block";

  const r=ref(db,"rooms/"+room);

  onValue(r,(snap)=>{
    const data=snap.val();
    if(data){
      board=data.board;
      turn=data.turn;
      render();
    }else{
      set(r,{
        board:startBoard(),
        turn:"black",
        p1:name,
        p2:"..."
      });
    }
  });
}

// ===== BOT MODE =====
window.playBot=function(){
  document.getElementById("menu").style.display="none";
  document.getElementById("game").style.display="block";
  render();
}

// ===== RENDER =====
function render(){
  const el=document.getElementById("board");
  el.innerHTML="";

  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){

      const sq=document.createElement("div");
      sq.className="sq "+(((r+c)%2)?"dark":"light");

      if(board[r][c]){
        const p=document.createElement("div");
        p.className="piece "+(board[r][c]==B?"black":"white");
        sq.appendChild(p);
      }

      sq.onclick=()=>move(r,c);

      el.appendChild(sq);
    }
  }
}

// ===== MOVE =====
function move(r,c){
  if(turn!=="black") return;

  if(board[r][c]){
    selected=[r,c];
    return;
  }

  if(selected){
    board[r][c]=board[selected[0]][selected[1]];
    board[selected[0]][selected[1]]=EMPTY;

    turn="white";

    if(room){
      update(ref(db,"rooms/"+room),{
        board,
        turn
      });
    }

    selected=null;
    render();
  }
}

let selected=null;

render();

</script>
</body>
</html>
