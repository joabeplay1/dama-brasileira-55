<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Damas Online</title>

<style>
/* (SEU CSS ORIGINAL MANTIDO) */
body { font-family: Arial; background:#1a1008; color:#fff; text-align:center; }
button { padding:10px; margin:5px; cursor:pointer; }
#board { display:grid; grid-template-columns:repeat(8,1fr); max-width:400px; margin:auto; }
.sq { width:50px; height:50px; display:flex; align-items:center; justify-content:center; }
.dark { background:#7a4a22; }
.light { background:#c8a878; }
.piece { width:80%; height:80%; border-radius:50%; }
.black { background:black; }
.white { background:white; }
</style>
</head>

<body>

<h1>♛ Damas Online</h1>

<div id="menu">
  <button onclick="criarSala()">🌐 Criar Sala</button>
  <button onclick="entrarSala()">🔑 Entrar Sala</button>
</div>

<div id="game" style="display:none">
  <h3 id="turno"></h3>
  <div id="board"></div>
</div>

<!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAEhCjjnW2dzOd1gRLc0KHkf3lOEYqje0c",
  authDomain: "dama-77.firebaseapp.com",
  databaseURL: "https://dama-77-default-rtdb.firebaseio.com",
  projectId: "dama-77",
  storageBucket: "dama-77.firebasestorage.app",
  messagingSenderId: "267002047594",
  appId: "1:267002047594:web:911ef1cb65d84a44a26e13"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let salaAtual = null;
let jogador = null;
let board = [];
let turno = "black";

// ===== TABULEIRO =====
function criarBoard() {
  board = Array(8).fill(null).map(()=>Array(8).fill(null));
  for(let r=0;r<3;r++) for(let c=0;c<8;c++) if((r+c)%2) board[r][c]="w";
  for(let r=5;r<8;r++) for(let c=0;c<8;c++) if((r+c)%2) board[r][c]="b";
}

// ===== RENDER =====
function render() {
  const el = document.getElementById("board");
  el.innerHTML="";

  document.getElementById("turno").innerText =
    turno === jogador ? "SUA VEZ" : "AGUARDE...";

  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){
      const sq = document.createElement("div");
      sq.className = "sq " + ((r+c)%2?"dark":"light");

      const p = board[r][c];
      if(p){
        const pc = document.createElement("div");
        pc.className = "piece " + (p==="b"?"black":"white");
        sq.appendChild(pc);
      }

      sq.onclick = ()=>clicar(r,c);
      el.appendChild(sq);
    }
  }
}

// ===== CLICK =====
let selecionado=null;

function clicar(r,c){
  if(turno !== jogador) return;

  if(selecionado){
    mover(selecionado,[r,c]);
    selecionado=null;
  } else {
    if(board[r][c] && ((jogador==="black" && board[r][c]==="b") || (jogador==="white" && board[r][c]==="w"))){
      selecionado=[r,c];
    }
  }
}

// ===== MOVER (SIMPLES) =====
function mover(de,para){
  board[para[0]][para[1]] = board[de[0]][de[1]];
  board[de[0]][de[1]] = null;

  turno = turno==="black"?"white":"black";

  update(ref(db,"salas/"+salaAtual),{
    board: board,
    turno: turno
  });
}

// ===== ONLINE =====
function criarSala(){
  const id = Math.random().toString(36).substr(2,5);

  salaAtual = id;
  jogador = "black";

  criarBoard();

  set(ref(db,"salas/"+id),{
    board: board,
    turno: "black"
  });

  alert("Sala: "+id);
  entrar(id);
}

function entrarSala(){
  const id = prompt("Código da sala:");
  salaAtual = id;
  jogador = "white";
  entrar(id);
}

function entrar(id){
  document.getElementById("menu").style.display="none";
  document.getElementById("game").style.display="block";

  onValue(ref(db,"salas/"+id),(snap)=>{
    const data = snap.val();
    if(data){
      board = data.board;
      turno = data.turno;
      render();
    }
  });
}

window.criarSala = criarSala;
window.entrarSala = entrarSala;
</script>

</body>
</html>
